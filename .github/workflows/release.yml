name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build Electron App (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Build Electron distributables
        run: npx electron-builder --win portable nsis --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        id: list_artifacts
        shell: pwsh
        run: |
          Write-Host "=== Release directory structure ==="
          if (Test-Path release) {
            Get-ChildItem -Path release -Recurse | Select-Object FullName, Length
            $files = Get-ChildItem -Path release -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            Write-Host "Found EXE files: $($files.Count)"
            $files | ForEach-Object { Write-Host "  $_" }
          } else {
            Write-Host "WARNING: 'release' directory not found!"
            Get-ChildItem -Path . -Depth 2 | Where-Object { $_.Extension -eq ".exe" } | Select-Object FullName
          }

      - name: Upload Portable EXE
        id: upload_portable
        uses: actions/upload-artifact@v4
        with:
          name: portable-exe
          path: release/**/*.exe
          if-no-files-found: warn

      - name: Upload Setup EXE
        id: upload_setup
        uses: actions/upload-artifact@v4
        with:
          name: setup-exe
          path: release/**/*Setup*.exe
          if-no-files-found: warn

      - name: Attest all EXE artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/**/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
